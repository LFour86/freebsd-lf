# =====================
# FreeBSD PF Workstation
# =====================

# ── Macros & Tables
ext_ifs = "{ re0, wifibox0 }"

table <f2b> persist
table <trusted_lan_v4> { 192.168.0.0/16 }
table <trusted_lan_v6> { fe80::/10 }

# ── Global Options
set skip on lo0
set block-policy drop
set loginterface re0

# ── Normalization
scrub in all fragment reassemble max-mss 1440

# ── Translation (NAT)
nat on re0 from $hotspot_net to any -> (re0)
nat on wifibox0 from $hotspot_net to any -> (wifibox0)

# ── DEFAULT POLICY
block in all
pass out all keep state

# ── Anti-Spoofing (Full IPv4/IPv6 Support)
antispoof quick for $ext_ifs
antispoof quick for $hotspot_if

# ── Captive Portal Whitelist
# Allow inbound traffic from portal IPs to bypass state mismatches
table <captive_portals> const { 172.25.0.0/16, 192.168.1.1 }
pass in quick on $ext_ifs from <captive_portals> to any

# ── Pre-Filter: Silent Drops
anchor "f2b/*"
block in log quick from <f2b> to any
block in quick inet proto tcp flags SF/SF
block in quick inet proto tcp flags SR/SR
block in quick proto { tcp, udp } to port { 135, 137, 138, 139, 445 }

# ── IPv6 Core Services (Interface-Split for Security)
# Hotspot: Stateless NDP (Prevents state table exhaustion)
pass in quick on $hotspot_if inet6 proto icmp6 all icmp6-type { neighbrsol, neighbradv } no state
# Hotspot: Stateful ICMPv6 for everything else
pass in quick on $hotspot_if inet6 proto icmp6 all icmp6-type { routersol, routeradv, echoreq, unreach, timex } keep state

# External: Stateless NDP
pass in quick on $ext_ifs inet6 proto icmp6 all icmp6-type { neighbrsol, neighbradv } no state
# External: Minimal ICMPv6 for client role, rate-limited
pass in quick on $ext_ifs inet6 proto icmp6 all icmp6-type { unreach, timex, echoreq } max-pkt-rate 10/1 keep state

# ── Host Services (Visible to hotspot clients)
# DHCPv4 (Client requests only; server replies out naturally. Prevents rogue DHCP)
pass in quick on $hotspot_if inet proto udp from any port 68 to any port 67

# DHCPv6 (Include multicast target)
pass in quick on $hotspot_if inet6 proto udp from fe80::/10 port 546 to { fe80::/10, ff02::1:2 } port 547 keep state

# DNS & mDNS (Unicast + Multicast)
pass in quick on $hotspot_if proto { tcp, udp } from { $hotspot_net, fe80::/10 } to ($hotspot_if) port { 53, 5353 }
pass in quick on $hotspot_if proto udp from { $hotspot_net, fe80::/10 } to { 224.0.0.251, ff02::fb } port 5353 keep state

# ── ICMPv4 Control
pass in quick on $hotspot_if proto icmp from $hotspot_net to ($hotspot_if) icmp-type { echoreq, unreach, timex } keep state
pass in quick on $ext_ifs inet proto icmp from <trusted_lan_v4> to ($ext_ifs) icmp-type { echoreq, unreach, timex } max-pkt-rate 10/1 keep state

# ── Isolation (IPv4 + IPv6 Full Coverage)
# Block access to host and external LAN
block in log quick on $hotspot_if from any to { (re0:network), (wifibox0:network) }
block in log quick on $hotspot_if from any to ($hotspot_if)

# ── Inbound Services (Locked down)
# SSH: Only from trusted table, with brute-force rate limiting
# pass in quick on $ext_ifs proto tcp from <trusted_lan> to ($ext_ifs) port 22 \
#    flags S/SA keep state \
#    (max-src-conn 5, max-src-conn-rate 3/10, overload <f2b> flush global)

# ── Final Pass: Hotspot Internet Access
pass in on $hotspot_if from any to any modulate state
