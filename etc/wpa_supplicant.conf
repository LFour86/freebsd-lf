# /etc/wpa_supplicant.conf

# Global control interface for wpa_cli
ctrl_interface=/var/run/wpa_supplicant
# IEEE 802.1X/EAPOL version (2 is standard for modern networks)
eapol_version=2
# AP scanning: 1 = wpa_supplicant initiates scanning
ap_scan=1

# Scenario A: Standard WPA2/WPA3 Personal
network={
    ssid="Network1"
    psk="your_password"
    # Priority: Higher numbers are preferred first
    priority=100
}

# Scenario B: Open WiFi (No Password)
network={
    ssid="Network2"
    # Explicitly specify no key management
    key_mgmt=NONE
    priority=50
}

